<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Absensi Sekolah - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="login-container">
            <div class="login-header">
                <h1>📚 Sistem Absensi Sekolah</h1>
                <p>SMK Negeri 1 Contoh</p>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label>📧 Email</label>
                    <input type="email" id="email" required placeholder="email@sekolah.com">
                </div>
                <div class="form-group">
                    <label>🔒 Password</label>
                    <input type="password" id="password" required placeholder="Minimal 6 karakter">
                </div>
                <button type="submit">🔐 Login</button>
            </form>
            
            <div class="login-links">
                <p>Belum punya akun? <a href="register.html">Daftar di sini</a></p>
            </div>
            
            <div id="errorMessage" class="error-message"></div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
